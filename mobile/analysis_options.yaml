# Static analysis config for the Healyn patient app.
# analysis_options.yaml is the law (CLAUDE.md §5). Generated files are excluded.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat missing required-param and unused code as errors, not warnings.
    missing_required_param: error
    invalid_annotation_target: ignore # freezed/json_serializable noise on generated code
  exclude:
    - "**/*.freezed.dart"
    - "**/*.g.dart"

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_print
    - cancel_subscriptions
    - close_sinks
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_single_quotes
    - require_trailing_commas
    - sort_constructors_first
    - unawaited_futures
    - use_super_parameters
