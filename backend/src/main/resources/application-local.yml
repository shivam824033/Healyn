spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  flyway:
    placeholders:
      env: local

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

logging:
  level:
    root: INFO
    com.healyn: DEBUG
    # SQL logging off by default — the notifications poller runs every few seconds
    # and floods the console. Flip to DEBUG when you need to inspect queries.
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
