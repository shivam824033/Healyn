spring:
  application:
    name: healyn-backend
  profiles:
    active: ${HEALYN_PROFILE:local}
  datasource:
    url: jdbc:postgresql://${HEALYN_DB_HOST:localhost}:${HEALYN_DB_PORT:5432}/${HEALYN_DB_NAME:healyn}
    username: ${HEALYN_DB_USER:postgres}
    password: ${HEALYN_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      pool-name: healyn-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${HEALYN_REDIS_HOST:localhost}
      port: ${HEALYN_REDIS_PORT:6379}
      password: ${HEALYN_REDIS_PASSWORD:}
      database: ${HEALYN_REDIS_DB:0}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    default-property-inclusion: non_null

server:
  port: ${HEALYN_HTTP_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    persistAuthorization: true
    displayRequestDuration: true
  show-actuator: false

healyn:
  s3:
    endpoint: ${HEALYN_S3_ENDPOINT:http://localhost:9000}
    region: ${HEALYN_S3_REGION:us-east-1}
    access-key: ${HEALYN_S3_ACCESS_KEY:minioadmin}
    secret-key: ${HEALYN_S3_SECRET_KEY:minioadmin}
    bucket: ${HEALYN_S3_BUCKET:healyn-files-dev}
    presign-ttl-seconds: 300
  jwt:
    issuer: healyn
    audience: healyn-mobile
    access-token-ttl-seconds: 900
    refresh-token-ttl-days: 30
    private-key-path: ${HEALYN_JWT_PRIVATE_KEY_PATH:}
    public-key-path: ${HEALYN_JWT_PUBLIC_KEY_PATH:}
  password:
    pepper: ${HEALYN_PASSWORD_PEPPER:}
