spring:
  application:
    name: healyn-backend
  profiles:
    active: ${HEALYN_PROFILE:local}
  datasource:
    url: jdbc:postgresql://${HEALYN_DB_HOST:localhost}:${HEALYN_DB_PORT:5432}/${HEALYN_DB_NAME:healyn}
    username: ${HEALYN_DB_USER:postgres}
    password: ${HEALYN_DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4
      pool-name: healyn-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${HEALYN_REDIS_HOST:localhost}
      port: ${HEALYN_REDIS_PORT:6379}
      password: ${HEALYN_REDIS_PASSWORD:}
      database: ${HEALYN_REDIS_DB:0}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jackson:
    default-property-inclusion: non_null
  # SMTP transport for OTP email. Blank host (the default) means no JavaMailSender is
  # auto-configured; SmtpOtpSender then fails fast outside local/test. local/test use the
  # console LoggingOtpSender and need none of this.
  mail:
    host: ${HEALYN_SMTP_HOST:}
    port: ${HEALYN_SMTP_PORT:587}
    username: ${HEALYN_SMTP_USERNAME:}
    password: ${HEALYN_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${HEALYN_SMTP_AUTH:true}
          starttls:
            enable: ${HEALYN_SMTP_STARTTLS:true}

server:
  port: ${HEALYN_HTTP_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        # Secure default: only health + info reach the public HTTP port. prod
        # (application-prod.yml) moves Actuator to an internal-only management port.
        # A real /actuator/prometheus endpoint additionally needs the
        # micrometer-registry-prometheus dependency, which is not on the classpath yet.
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  # Secure default (audit S-2): the OpenAPI spec and Swagger UI are OFF unless a profile
  # opts in. application-local.yml re-enables them for development; prod keeps them off.
  api-docs:
    enabled: false
    path: /v3/api-docs
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    persistAuthorization: true
    displayRequestDuration: true
  show-actuator: false

healyn:
  # OTP delivery. EMAIL goes over spring.mail.* SMTP (SmtpOtpSender); SMS is not wired yet
  # and fails fast (SmsOtpSender) until a provider adapter is added. local/test log to console.
  otp:
    email:
      from: ${HEALYN_OTP_EMAIL_FROM:}
      subject: ${HEALYN_OTP_EMAIL_SUBJECT:Your Healyn verification code}
  # Single-clinic reference frame (Phase 1). Used to derive clinic-local calendar days,
  # e.g. the YYYYMMDD stem of an Appointment Number. Instants are still stored as UTC.
  clinic:
    timezone: ${HEALYN_CLINIC_TIMEZONE:Asia/Kolkata}
  s3:
    endpoint: ${HEALYN_S3_ENDPOINT:http://localhost:9000}
    # Host put into presigned upload/download URLs (the one the device reaches);
    # blank reuses `endpoint`. Set to your LAN IP for on-device file uploads.
    public-endpoint: ${HEALYN_S3_PUBLIC_ENDPOINT:}
    region: ${HEALYN_S3_REGION:us-east-1}
    access-key: ${HEALYN_S3_ACCESS_KEY:minioadmin}
    secret-key: ${HEALYN_S3_SECRET_KEY:minioadmin}
    bucket: ${HEALYN_S3_BUCKET:healyn-files-dev}
    presign-ttl-seconds: 300
  jwt:
    issuer: healyn
    audience: healyn-mobile
    access-token-ttl-seconds: 900
    refresh-token-ttl-days: 30
    private-key-path: ${HEALYN_JWT_PRIVATE_KEY_PATH:}
    public-key-path: ${HEALYN_JWT_PUBLIC_KEY_PATH:}
  password:
    pepper: ${HEALYN_PASSWORD_PEPPER:}
  # Local/dev only: DevPhysioSeeder upserts one ROLE_PHYSIO login so the
  # physiotherapist app is reachable. Never used in prod, where the physio is
  # provisioned by an operator (README §5.1). The password is a dev default —
  # not a real secret.
  dev:
    physio:
      email: ${HEALYN_DEV_PHYSIO_EMAIL:physio@healyn.local}
      password: ${HEALYN_DEV_PHYSIO_PASSWORD:Physio!Dev123}
  # Prod provisioning of the single ROLE_PHYSIO login (README §5.2). Off by default. The
  # operator enables it once with a temporary email/password secret, boots, then turns it
  # back off and removes the password secret; the physio rotates via the reset flow on first
  # login. Hashing must run in-process (PasswordHasher mixes a server pepper) — offline SQL
  # inserts cannot produce a matching hash. Idempotent (PhysioBootstrapRunner).
  bootstrap:
    physio:
      enabled: ${HEALYN_BOOTSTRAP_PHYSIO_ENABLED:false}
      email: ${HEALYN_BOOTSTRAP_PHYSIO_EMAIL:}
      password: ${HEALYN_BOOTSTRAP_PHYSIO_PASSWORD:}
  notifications:
    poller-enabled: ${HEALYN_NOTIFICATIONS_POLLER_ENABLED:true}
    poll-interval-ms: ${HEALYN_NOTIFICATIONS_POLL_INTERVAL_MS:2000}
    batch-size: ${HEALYN_NOTIFICATIONS_BATCH_SIZE:50}
    max-attempts: ${HEALYN_NOTIFICATIONS_MAX_ATTEMPTS:5}
    backoff-base-seconds: ${HEALYN_NOTIFICATIONS_BACKOFF_BASE_SECONDS:2}
    lease-seconds: ${HEALYN_NOTIFICATIONS_LEASE_SECONDS:60}
  # When HEALYN_FCM_CREDENTIALS_PATH is set the real FirebaseFcmSender activates; when blank
  # the logging sender is used in local/test, but NotificationsConfig fails fast in any other
  # profile so a misconfigured prod deploy can't silently drop all push.
  fcm:
    credentials-path: ${HEALYN_FCM_CREDENTIALS_PATH:}
  # Compliance surface: consent capture + account deletion / right-to-erasure (audit §11 item 6).
  # grace-days is the cancellable window before anonymization. purge-enabled gates the hard-purge
  # of de-identified clinical scaffolding and stays OFF by default (Hard Rule #7 — needs sign-off).
  compliance:
    poller-enabled: ${HEALYN_COMPLIANCE_POLLER_ENABLED:true}
    poll-interval-ms: ${HEALYN_COMPLIANCE_POLL_INTERVAL_MS:60000}
    grace-days: ${HEALYN_COMPLIANCE_GRACE_DAYS:30}
    default-locale: ${HEALYN_COMPLIANCE_DEFAULT_LOCALE:en}
    purge-enabled: ${HEALYN_COMPLIANCE_PURGE_ENABLED:false}
    retention-days: ${HEALYN_COMPLIANCE_RETENTION_DAYS:2920}
